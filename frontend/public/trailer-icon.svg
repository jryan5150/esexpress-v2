<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 40" fill="none">
  <!-- Pneumatic frac sand trailer (bulk tanker) -->
  <!-- Trailer body - cylindrical tank -->
  <rect x="4" y="8" width="48" height="18" rx="9" fill="currentColor" opacity="0.15"/>
  <rect x="4" y="8" width="48" height="18" rx="9" stroke="currentColor" stroke-width="2" fill="none"/>
  <!-- Tank ribs -->
  <line x1="18" y1="9" x2="18" y2="25" stroke="currentColor" stroke-width="1.2" opacity="0.3"/>
  <line x1="32" y1="9" x2="32" y2="25" stroke="currentColor" stroke-width="1.2" opacity="0.3"/>
  <!-- Discharge line underneath -->
  <path d="M12 26 L12 30 L44 30 L44 26" stroke="currentColor" stroke-width="1.5" fill="none" opacity="0.5"/>
  <!-- Discharge valve -->
  <circle cx="28" cy="30" r="2" fill="currentColor" opacity="0.4"/>
  <!-- Top hatches -->
  <rect x="14" y="6" width="6" height="4" rx="2" fill="currentColor" opacity="0.25"/>
  <rect x="29" y="6" width="6" height="4" rx="2" fill="currentColor" opacity="0.25"/>
  <!-- Landing gear -->
  <line x1="8" y1="26" x2="8" y2="34" stroke="currentColor" stroke-width="2"/>
  <line x1="5" y1="34" x2="11" y2="34" stroke="currentColor" stroke-width="2"/>
  <!-- Kingpin area -->
  <rect x="1" y="15" width="5" height="4" rx="1" fill="currentColor" opacity="0.3"/>
  <!-- Rear axle assembly -->
  <line x1="38" y1="26" x2="50" y2="26" stroke="currentColor" stroke-width="2.5"/>
  <!-- Wheels - tandem axle -->
  <circle cx="40" cy="30" r="4" stroke="currentColor" stroke-width="2" fill="currentColor" opacity="0.15"/>
  <circle cx="40" cy="30" r="1.5" fill="currentColor" opacity="0.4"/>
  <circle cx="48" cy="30" r="4" stroke="currentColor" stroke-width="2" fill="currentColor" opacity="0.15"/>
  <circle cx="48" cy="30" r="1.5" fill="currentColor" opacity="0.4"/>
  <!-- Fender -->
  <path d="M36 26 Q36 22 40 22 Q44 22 44 26" stroke="currentColor" stroke-width="1.2" fill="none" opacity="0.3"/>
  <path d="M44 26 Q44 22 48 22 Q52 22 52 26" stroke="currentColor" stroke-width="1.2" fill="none" opacity="0.3"/>
  <!-- Air lines -->
  <path d="M52 17 Q56 17 58 14" stroke="currentColor" stroke-width="1" opacity="0.3" fill="none"/>
  <path d="M52 20 Q56 20 58 17" stroke="currentColor" stroke-width="1" opacity="0.3" fill="none"/>
</svg>
