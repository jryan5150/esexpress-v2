<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EsExpress Dispatch</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <!-- Theme init: runs before React to prevent FOUC -->
    <script>
      (function () {
        const saved = localStorage.getItem('esexpress-theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        let theme;
        if (saved === 'system' || !saved) {
          theme = prefersDark ? 'dark' : 'light';
        } else {
          theme = saved;
        }
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
